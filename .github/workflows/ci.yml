name: CI

# Push em main/staging/develop é coberto pelo deploy.yml (test → build → deploy → smoke).
# Este workflow valida apenas pull requests.
on:
  pull_request:
    branches: [main, staging, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./pkg/... ./internal/...
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/server ./cmd/server/
      - name: Build Docker image
        run: docker build -t backend-go-role-organizado:${{ github.sha }} .
